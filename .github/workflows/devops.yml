name: maki-math-devops
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-build-publish:
    runs-on: [self-hosted]
    container:
      image: mcr.microsoft.com/dotnet/sdk:8.0
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: |
        dotnet restore
        dotnet tool install --global dotnet-ef --version 8.0
    - name: Build
      run: dotnet publish
    - name: Generate Migration Script
      run: dotnet ef --project MathAPI  migrations script --idempotent > MathAPI/bin/Release/net8.0/publish/migration.sql
    - name: publish backend
      uses: actions/upload-artifact@v4
      with:
        name: dotnet-artifact
        path: MathAPI/bin/Release/net8.0/publish
        retention-days: 1
  frontend-build-publish:
    runs-on: [self-hosted]
    defaults:
      run:
        working-directory: ./web-client
    container:
      image: node:22
    steps:
    - uses: actions/checkout@v4
    - name: restore packages
      run: npm install
    - name: build vite
      run: npm run build
    - name: publish frontend
      uses: actions/upload-artifact@v4
      with:
        name: vite-artifact
        path: web-client/dist
        retention-days: 1