name: maki-math-devops

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- 后端构建与发布任务 ---
  backend-build-publish:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted]
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore and Install Tools
      run: |
        dotnet restore
        dotnet tool install --global dotnet-ef --version 10.0.* || dotnet tool update --global dotnet-ef --version 10.0.*
    
    - name: Build and Publish
      run: dotnet publish MathAPI/MathAPI.csproj -c Release -o MathAPI/publish_output

    - name: Generate Migration Script
      run: |
        export PATH="$PATH:$HOME/.dotnet/tools"
        dotnet ef migrations script --idempotent \
          --project MathAPI/MathAPI.csproj \
          --configuration Release \
          --no-build \
          --output MathAPI/publish_output/migration.sql

    - name: Upload Backend Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dotnet-artifact
        path: MathAPI/publish_output
        retention-days: 1

  # --- 前端构建与发布任务 (针对 pnpm 进行了修改) ---
  frontend-build-publish:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted]
    defaults:
      run:
        working-directory: ./web-client
    container:
      image: node:22
    steps:
    - uses: actions/checkout@v4

    # 1. 启用 Corepack 并安装 pnpm
    - name: Install pnpm
      run: |
        corepack enable
        corepack prepare pnpm@latest --activate

    # 2. 安装依赖 (使用 pnpm)
    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    # 3. 执行构建 (使用 pnpm)
    - name: Build Vite project
      run: pnpm build

    - name: Upload Frontend Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vite-artifact
        path: web-client/dist
        retention-days: 1

  # --- 自动化部署任务 ---
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted]
    needs: ["frontend-build-publish", "backend-build-publish"]
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded_artifacts

      - name: Stop Backend Service
        run: ssh maki-math-prod "sudo systemctl stop math-api.service"

      - name: Deploy Files via Rsync
        run: |
          rsync -avz --delete ./downloaded_artifacts/vite-artifact/ maki-math-prod:/var/www/math_platform/web-client/dist/
          rsync -avc --delete ./downloaded_artifacts/dotnet-artifact/ maki-math-prod:/var/www/math_platform/publish/

      - name: Apply Database Migrations
        run: |
          ssh maki-math-prod "psql -U math_admin -d math_db -f /var/www/math_platform/publish/migration.sql"

      - name: Start Backend Service
        run: ssh maki-math-prod "sudo systemctl start math-api.service"